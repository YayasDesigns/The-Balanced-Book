<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Balanced Book — Weekly Pages</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /*
      WEEKLY FRONT — Grid-aligned layout (all multiples of 5mm):
      Content area: 133mm × 200mm.
      "Week of:" header: 10mm
      "Goals and Priorities" title: 5mm
      Goals box: 40mm (5pad + 5title-space + 5×5 bullet lines + 5pad)
      Gap: 5mm
      "Habit Tracker" title: 5mm
      Day headers: 5mm
      7 habit rows × 10mm: 70mm
      Gap: 5mm
      "Next Week" title: 5mm
      Remaining lines: 40mm (8 × 5mm lines)
      Total: 10+5+40+5+5+5+70+5+5+40 = 190mm + 10mm flex
    */

    /* ---- Shift all content 5mm right on both pages ---- */
    .weekly-front {
      padding-left: 15mm; /* 10mm spiral + 5mm extra */
      background-image: none;
    }
    .weekly-back {
      padding-left: 5mm;
      padding-right: 15mm;
      background-image: none;
    }

    /* ---- Weekly header ---- */
    .week-header {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 10pt;
      color: var(--black);
      height: 10mm;
      line-height: 10mm;
    }

    .week-header .fill-line {
      border-bottom: 1px solid var(--black);
      display: inline-block;
      width: 40mm;
      margin-left: 5mm;
    }

    /* ---- Goals box ---- */
    .goals-box {
      border: 1.5px solid var(--black);
      padding: 5mm;
      height: 35mm; /* 5pad + 5×5mm rows */
    }

    /* ---- Habit Tracker ---- */
    .habit-section {
      margin-top: 5mm;
    }

    .habit-day-headers {
      display: flex;
      justify-content: flex-end;
      height: 5mm;
      line-height: 5mm;
    }

    .habit-day-headers span {
      width: 10mm;
      text-align: center;
      font-size: 8pt;
      font-weight: bold;
      color: var(--black);
    }

    .habit-row {
      display: flex;
      align-items: center;
      height: 10mm;
      border-bottom: 0.5px solid var(--line-gray);
    }

    /* Purple checkbox + line for habit name */
    .habit-label {
      display: flex;
      align-items: center;
      gap: 2.5mm;
      flex: 1;
    }

    .habit-label .habit-line {
      flex: 1;
      border-bottom: 0.5px solid var(--line-gray);
      height: 5mm;
    }

    /* 7 day checkboxes, each in a 10mm cell */
    .habit-days {
      display: flex;
    }

    .habit-days .day-cell {
      width: 10mm;
      height: 10mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Next Week section ---- */
    .next-week {
      margin-top: 5mm;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /*
      WEEKLY BACK — Grid-aligned layout:
      "Acts of Kindness" title: 10mm
      Two-column box: 75mm
      Gap: 5mm
      "Self Reflections" title: 5mm
      Day headers: 5mm
      2 rows × 10mm: 20mm
      Gap: 5mm
      "Open Space" title: 5mm
      Lines: remaining ~70mm
    */

    /* ---- Acts of Kindness & Biggest Wins ---- */
    .kindness-wins-box {
      border: 1.5px solid var(--black);
      padding: 0 5mm 5mm 5mm;
      height: 60mm;
      display: flex;
      flex-direction: column;
    }

    .kindness-wins-title {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 14pt;
      color: var(--accent);
      height: 10mm;
      line-height: 10mm;
      margin: -1px -5mm 0 -5mm;
      padding-left: 5mm;
      border-bottom: 1.5px solid var(--black);
    }

    .kindness-wins-columns {
      display: flex;
      flex: 1;
      gap: 0;
    }

    .kindness-wins-columns .col {
      flex: 1;
      padding: 0;
    }

    .kindness-wins-columns .divider {
      width: 1.5px;
      background: var(--black);
      flex-shrink: 0;
      margin-left: 5mm;
    }

    .kindness-wins-columns .divider-after {
      margin-left: 0;
    }


    /* Open dot rows — 10mm tall, no writing lines */
    .dot-row {
      height: 10mm;
      display: flex;
      align-items: center;
    }

    /* ---- Self Reflections ---- */
    .reflections-section {
      margin-top: 5mm;
    }

    .reflections-prompt {
      display: flex;
      align-items: center;
      gap: 2.5mm;
      height: 10mm;
    }

    .prompt-text {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 8pt;
      color: var(--accent);
    }

    /* ---- Open Space ---- */
    .open-notes {
      margin-top: 5mm;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .notes-lines {
      flex: 1;
    }

    .open-notes-area {
      flex: 1;
      background-image: radial-gradient(circle, #888 0.6px, transparent 0.6px);
      background-size: 5mm 5mm;
    }
  </style>
</head>
<body>

    <input type="color" id="accentPicker" value="#7B2D8E"

  <!-- ==================== WEEKLY — FRONT ==================== -->

    <div class="week-header">

    <!-- Goals and Priorities title (5mm) -->
    <div class="title-accent">Goals and Priorities</div>

    <!-- Goals box (5pad + 5×5mm rows + 5pad) -->
    <div class="goals-box">
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>

      <div class="bullet-row"><span class="bullet-dot"></span></div>
    </div>

    <!-- Habit Tracker (margin-top 5mm) -->
    <div class="habit-section">
      <div class="title-accent">Habit Tracker</div>

      <!-- Day headers (5mm) -->
      <div class="habit-day-headers">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>

      <!-- 7 habit rows (10mm each = 70mm) -->
      <div class="habit-row">

        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
      <div class="habit-row">
        <div class="habit-label"><div class="cb-accent-sm"></div><div class="habit-line"></div></div>
        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
      <div class="habit-row">
        <div class="habit-label"><div class="cb-accent-sm"></div><div class="habit-line"></div></div>
        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
      <div class="habit-row">
        <div class="habit-label"><div class="cb-accent-sm"></div><div class="habit-line"></div></div>
        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
      <div class="habit-row">
        <div class="habit-label"><div class="cb-accent-sm"></div><div class="habit-line"></div></div>
        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
      <div class="habit-row">
        <div class="habit-label"><div class="cb-accent-sm"></div><div class="habit-line"></div></div>
        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>

          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>

          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
      <div class="habit-row">
        <div class="habit-label"><div class="cb-accent-sm"></div><div class="habit-line"></div></div>
        <div class="habit-days">
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
          <div class="day-cell"><div class="cb-black"></div></div>
        </div>
      </div>
    </div>

    <!-- Next Week's Goals and Priorities -->
    <div class="next-week">
      <div class="title-accent">Next Week's Goals and Priorities</div>
      <div class="goals-box">
        <div class="bullet-row"><span class="bullet-dot"></span></div>
        <div class="bullet-row"><span class="bullet-dot"></span></div>
        <div class="bullet-row"><span class="bullet-dot"></span></div>

      </div>
    </div>

  </div>

  <!-- ==================== WEEKLY — BACK ==================== -->
  <div class="page-label">WEEKLY — BACK</div>
  <div class="page weekly-back">

    <!-- Acts of Kindness & Biggest Wins -->
    <div class="kindness-wins-box">
      <!-- Title inside the box -->
      <div class="kindness-wins-title">Acts of Kindness &amp; Biggest Wins</div>
      <div class="kindness-wins-columns">
        <!-- Divider before left circles -->

          <div class="dot-row"><span class="bullet-dot"></span></div>
          <div class="dot-row"><span class="bullet-dot"></span></div>

          <div class="dot-row"><span class="bullet-dot"></span></div>
          <div class="dot-row"><span class="bullet-dot"></span></div>
        </div>
        <!-- Divider after left circles -->
        <div class="divider divider-after"></div>
        <!-- Vertical divider -->
        <div class="divider"></div>
        <!-- Right column -->
        <div class="col">
          <div class="dot-row"><span class="bullet-dot"></span></div>
          <div class="dot-row"><span class="bullet-dot"></span></div>
          <div class="dot-row"><span class="bullet-dot"></span></div>

        </div>

    <!-- Self Reflections -->
    <div class="reflections-section">
      <div class="title-accent">Self-Reflections:</div>

      <!-- Row 1: Stressful/Hard -->
      <div class="reflections-prompt">
        <div class="cb-black"></div>
        <span class="prompt-text">Things that were Stressful or Hard? How did I overcome?</span>
      </div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>

      <!-- Row 2: Fun/Relaxing -->
      <div class="reflections-prompt">
        <div class="cb-black"></div>
        <span class="prompt-text">Things that were Fun and/or Relaxing? How to do more?</span>
      </div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
    </div>

    <!-- Open Space -->
    <div class="open-notes">
      <div class="title-accent">Open Space</div>
      <div class="open-notes-area"></div>
    </div>

  </div>

</body>
</html>
