<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Balanced Book — Daily Pages</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /*
      DAILY FRONT — Grid-aligned layout (all multiples of 5mm):
      Content area: 133mm × 200mm.
      Date header: 10mm
      Gratitude box: 35mm (5pad + 5×5mm lines + 5pad)
      Gap: 5mm
      Affirmations box: 25mm (5pad + 3×5mm lines + 5pad)
      Gap: 5mm
      Mode Tracker label: 5mm
      Mode Tracker area: 35mm
      Gap: 5mm
      Tasks box: 30mm (5pad + 4×5mm rows + 5pad)
      Gap: 5mm
      Excitements box: 30mm (5pad + 4×5mm rows + 5pad)
      Page number: 5mm
      Total: 10+35+5+25+5+5+35+5+30+5+30+5 = 200mm ✓
    */

    /* ---- Daily front: match weekly front padding ---- */
    .daily-front {
      padding-left: 15mm;
    }

    /* ---- Daily header ---- */
    .daily-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 10mm;
    }

    .date-area {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 10pt;
      color: var(--black);
      display: flex;
      align-items: baseline;
      gap: 2.5mm;
    }

    .date-fill {
      border-bottom: 1px solid var(--black);
      width: 10mm;
      display: inline-block;
    }

    .day-letters {
      display: flex;
      gap: 0;
      font-size: 9pt;
      font-weight: bold;
      color: var(--black);
    }

    .day-letters span {
      width: 5mm;
      height: 5mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Content boxes ---- */
    .daily-box {
      border: 1.5px solid var(--black);
      padding: 5mm;
    }

    .daily-box .title-black {
      margin-bottom: 0;
    }

    /* ---- Mode Tracker: open dot-grid area ---- */
    .mode-area {
      height: 35mm;
    }

    /* ---- Section spacer (5mm gap) ---- */
    .gap {
      height: 5mm;
      flex-shrink: 0;
    }

    /* ---- DAILY BACK ---- */

    /* Reflections box */
    .reflections-box {
      border: 1.5px solid var(--black);
      padding: 5mm;
      position: relative;
      height: 115mm;
    }

    .reflection-item {
      margin-bottom: 5mm;
    }

    .reflection-label {
      display: flex;
      align-items: center;
      gap: 2.5mm;
      height: 5mm;
    }

    .reflection-label .sq {
      width: 2.5mm;
      height: 2.5mm;
      border: 1px solid var(--accent);
      flex-shrink: 0;
    }

    .reflection-label span {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 9pt;
      color: var(--accent);
    }

    .reflection-lines {
      margin-left: 5mm;
    }

    /* ---- S.A.R.E. chart (inside Reflections, bottom-right) ---- */
    .sare-wrapper {
      position: absolute;
      bottom: 5mm;
      right: 5mm;
    }

    .sare-layout {
      display: flex;
      align-items: flex-start;
    }

    .sare-labels {
      display: flex;
      flex-direction: column;
      margin-right: 2.5mm;
    }

    .sare-labels span {
      height: 5mm;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 7pt;
      font-weight: bold;
      color: var(--black);
    }

    .sare-grid {
      border-collapse: collapse;
    }

    .sare-grid td {
      width: 5mm;
      height: 5mm;
      border: 0.5px solid var(--black);
    }

    .sare-numbers {
      display: flex;
    }

    .sare-numbers span {
      width: 5mm;
      text-align: center;
      font-size: 5.5pt;
      color: var(--accent);
      font-weight: bold;
      height: 5mm;
      line-height: 5mm;
    }

    /* ---- Mind Clutter / Notes ---- */
    .mind-clutter {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: 5mm;
    }

    .mind-clutter-lines {
      flex: 1;
      border-top: 1px solid var(--black);
    }

    /* ---- Page number ---- */
    .page-number {
      position: absolute;
      bottom: 5mm;
      right: 5mm;
      font-size: 8pt;
      color: var(--accent);
      font-style: italic;
      font-family: var(--font-heading);
    }
  </style>
</head>
<body>

  <!-- Color Customizer -->
  <div class="color-picker-bar">
    <label>Accent Color:</label>
    <input type="color" id="accentPicker" value="#7B2D8E"
           onchange="document.documentElement.style.setProperty('--accent', this.value)">
  </div>

  <!-- ==================== DAILY — FRONT ==================== -->
  <div class="page-label">DAILY — FRONT</div>
  <div class="page daily-front">

    <!-- Date header (10mm) -->
    <div class="daily-header">
      <div class="date-area">
        <span>Date</span>
        <span class="date-fill"></span>
        <span>/</span>
        <span class="date-fill"></span>
        <span>/</span>
        <span class="date-fill"></span>
      </div>
      <div class="day-letters">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
    </div>

    <!-- Gratitude box -->
    <div class="title-black" style="height: 5mm; line-height: 5mm;">Gratitude...</div>
    <div class="daily-box" style="height: 40mm;">
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
    </div>

    <div class="gap"></div>

    <!-- Affirmations box -->
    <div class="title-black" style="height: 5mm; line-height: 5mm;">Affirmations...</div>
    <div class="daily-box" style="height: 25mm;">
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
    </div>

    <div class="gap"></div>

    <!-- Mode Tracker (open area, no box) -->
    <div class="title-black">Mode Tracker :</div>
    <div class="mode-area"></div>

    <div class="gap"></div>

    <!-- Today Main Tasks box -->
    <div class="title-black">Today Main Tasks...</div>
    <div class="daily-box" style="height: 25mm;">
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
    </div>

    <div class="gap"></div>

    <!-- Tomorrow's Excitements box -->
    <div class="title-black">Tomorrow's Excitements...</div>
    <div class="daily-box" style="height: 25mm;">
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
      <div class="bullet-row"><span class="bullet-dot"></span></div>
    </div>


  </div>

  <!-- ==================== DAILY — BACK ==================== -->
  <div class="page-label">DAILY — BACK</div>
  <div class="page">

    <!-- Reflections box (115mm, with SARE chart inside) -->
    <div class="reflections-box">
      <div class="title-black" style="margin-bottom: 0;">Reflections...</div>

      <div style="height: 5mm;"></div>

      <!-- Good Things & Highlights -->
      <div class="reflection-item">
        <div class="reflection-label">
          <div class="sq"></div>
          <span>Good Things &amp; Highlights</span>
        </div>
        <div class="reflection-lines">
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
      </div>

      <!-- Improvements -->
      <div class="reflection-item">
        <div class="reflection-label">
          <div class="sq"></div>
          <span>Improvements</span>
        </div>
        <div class="reflection-lines">
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
      </div>

      <!-- Advice -->
      <div class="reflection-item" style="margin-bottom: 0;">
        <div class="reflection-label">
          <div class="sq"></div>
          <span>Advice</span>
        </div>
        <div class="reflection-lines">
          <div class="write-line"></div>
        </div>
      </div>

      <!-- S.A.R.E. chart (bottom-right of Reflections box) -->
      <div class="sare-wrapper">
        <div class="sare-layout">
          <div class="sare-labels">
            <span>S</span>
            <span>A</span>
            <span>R</span>
            <span>E</span>
          </div>
          <div>
            <table class="sare-grid">
              <tbody>
                <tr>
                  <td></td><td></td><td></td><td></td><td></td>
                  <td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td></td><td></td><td></td><td></td><td></td>
                  <td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td></td><td></td><td></td><td></td><td></td>
                  <td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td></td><td></td><td></td><td></td><td></td>
                  <td></td><td></td><td></td><td></td><td></td>
                </tr>
              </tbody>
            </table>
            <div class="sare-numbers">
              <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
              <span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Mind Clutter / Notes -->
    <div class="mind-clutter">
      <div class="title-black">Mind Clutter / Notes...</div>
      <div class="mind-clutter-lines">
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
        <div class="write-line"></div>
      </div>
    </div>

  </div>

</body>
</html>
